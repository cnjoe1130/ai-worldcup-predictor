# AI预测系统配置文件
# 复制此文件为 config.yaml，填入你的API Key

# LLM配置（任选一个）
llm:
  # 方案1: OpenAI
  provider: openai
  api_key: "sk-your-openai-key"
  model: "gpt-4o-mini"
  
  # 方案2: Claude（取消注释）
  # provider: anthropic
  # api_key: "sk-ant-your-claude-key"
  # model: "claude-3-haiku-20240307"
  
  # 方案3: Groq（免费，推荐新手）
  # provider: groq
  # api_key: "gsk_your-groq-key"
  # model: "llama-3.3-70b-versatile"

# 赛程数据源
schedule:
  source: wikipedia  # wikipedia 或 manual（手动输入）
  group: "J"  # 小组赛组别

# 输出配置
output:
  dir: "./output"
  format: "png"
  width: 1080
  height: 1440

# 卡片风格
style:
  theme: "dark"  # dark（暗底）或 light（暖色）
  font: "Noto Sans SC"
